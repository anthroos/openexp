name: sales
description: Sales and deal closing — optimizes for revenue outcomes
session_reward_weights:
  commit: 0.05
  pr: 0.05
  writes: 0.01
  deploy: 0.0
  tests: 0.0
  decisions: 0.2
  email_sent: 0.15
  follow_up: 0.1
  base: -0.05
outcome_resolvers:
  - "openexp.resolvers.crm_csv:CRMCSVResolver"
retrieval_boosts:
  decision: 1.3
  outcome: 1.1
q_config_overrides:
  alpha: 0.3

process_stages:
  - name: lead
    description: New lead identified
    reward_on_enter: 0.0
  - name: contacted
    description: Initial outreach sent
    reward_on_enter: 0.1
  - name: qualified
    description: Lead confirmed as viable opportunity
    reward_on_enter: 0.2
  - name: proposal
    description: Proposal or quote sent
    reward_on_enter: 0.3
  - name: negotiation
    description: Active negotiation on terms
    reward_on_enter: 0.4
  - name: won
    description: Deal closed, payment expected
    reward_on_enter: 0.8

# Sales process: focus on decisions and insights, not raw actions
reward_memory_types:
  - decision
  - insight
  - outcome
